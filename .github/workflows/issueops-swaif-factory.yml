name: SWAIF Factory (IssueOps)

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage to run (init|specify|plan|tasks|implement|verify)"
        required: true
        type: choice
        options: [init, specify, plan, tasks, implement, verify]
      issue_number:
        description: "Issue number"
        required: true
        type: number
      mode:
        description: "suggest | apply"
        required: true
        type: choice
        options: [suggest, apply]
        default: suggest

permissions:
  contents: write
  pull-requests: write
  issues: write
  repository-projects: write

jobs:
  run-stage:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && startsWith(github.event.label.name, 'swaif:')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/run '))

    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PROJECTS_TOKEN: ${{ secrets.PROJECTS_SECRET || github.token }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SWAIF_MODEL: ${{ vars.SWAIF_MODEL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve stage + issue data
        id: meta
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.PROJECTS_TOKEN }}
          script: |
            const eventName = context.eventName;
            const allowedStages = new Set(['init','specify','plan','tasks','implement','verify']);

            let issueNumber = '';
            if (eventName === 'workflow_dispatch') issueNumber = String(core.getInput('issue_number'));
            else issueNumber = String(context.payload.issue.number);

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = await github.rest.issues.get({ owner, repo, issue_number: Number(issueNumber) });

            let stage = '';
            if (eventName === 'workflow_dispatch') stage = String(core.getInput('stage')).trim();
            else if (eventName === 'issues') stage = (context.payload.label?.name || '').replace('swaif:', '').trim();
            else {
              const c = context.payload.comment?.body || '';
              const m = c.match(/\/run\s+(init|specify|plan|tasks|implement|verify)\b/i);
              stage = (m ? m[1].toLowerCase() : '');
            }

            if (!allowedStages.has(stage)) {
              core.setFailed(`Stage inválido: '${stage}'.`);
              return;
            }

            let mode = 'suggest';
            if (eventName === 'workflow_dispatch') mode = String(core.getInput('mode') || 'suggest');
            else if (eventName === 'issue_comment') {
              const c = context.payload.comment?.body || '';
              const mm = c.match(/\/run\s+(?:init|specify|plan|tasks|implement|verify)\s+(suggest|apply)\b/i);
              if (mm) mode = mm[1].toLowerCase();
            }

            core.setOutput('stage', stage);
            core.setOutput('mode', mode);
            core.setOutput('issue_number', String(issue.data.number));
            core.setOutput('issue_title', issue.data.title || '');
            core.setOutput('issue_body', issue.data.body || '');

            // Parse issue form headings
            const body = issue.data.body || '';
            const readHeading = (heading) => {
              const pattern = new RegExp(`^### ${heading}\\s*$\\n([\\s\\S]*?)(?=^### |$)`, 'm');
              const match = body.match(pattern);
              if (!match) return '';
              const value = match[1]
                .split('\n')
                .map((line) => line.trim())
                .find((line) => line.length > 0 && line !== '_No response_');
              return value || '';
            };

            const featureSlug =
              readHeading('Identificador da Feature (slug)') ||
              readHeading('Feature Slug');

            const executionType =
              readHeading('Tipo de Execução (declarado)') ||
              readHeading('Tipo de Execução') ||
              readHeading('Declared Execution Type');

            if (!featureSlug) {
              core.setFailed('Feature Slug ausente no body da issue.');
              return;
            }

            if (!executionType) {
              core.setFailed('Tipo de Execução ausente no body da issue.');
              return;
            }

            core.setOutput('feature_slug', featureSlug);
            core.setOutput('execution_type', executionType);

      - name: Comment start
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ env.PROJECTS_TOKEN }}
          issue-number: ${{ steps.meta.outputs.issue_number }}
          body: |
            ## 🏭 SWAIF Factory — iniciado
            - Stage: `${{ steps.meta.outputs.stage }}`
            - Mode: `${{ steps.meta.outputs.mode }}`
            - Feature: `${{ steps.meta.outputs.feature_slug }}`
            - Run: `${{ github.run_id }}`

      - name: Run stage
        env:
          ISSUE_TITLE: ${{ steps.meta.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.meta.outputs.issue_body }}
          ISSUE_NUMBER: ${{ steps.meta.outputs.issue_number }}
          FEATURE_SLUG: ${{ steps.meta.outputs.feature_slug }}
          EXECUTION_TYPE: ${{ steps.meta.outputs.execution_type }}
          MODE: ${{ steps.meta.outputs.mode }}
          PROJECTS_TOKEN: ${{ env.PROJECTS_TOKEN }}
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x scripts/*.sh || true
          ./scripts/swaif_stage.sh             "${ISSUE_TITLE}"             "${{ steps.meta.outputs.stage }}"             "specs/${FEATURE_SLUG}"             "${EXECUTION_TYPE}"             "${ISSUE_NUMBER}"             "${MODE}"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swaif-logs-issue-${{ steps.meta.outputs.issue_number }}-stage-${{ steps.meta.outputs.stage }}-run-${{ github.run_id }}
          path: .swaif/logs/
          if-no-files-found: warn
          retention-days: 14

      - name: Summary
        if: always()
        run: |
          {
            echo "## 🏭 Resultado"
            echo "- Issue: #${{ steps.meta.outputs.issue_number }}"
            echo "- Stage: **${{ steps.meta.outputs.stage }}**"
            echo "- Mode: **${{ steps.meta.outputs.mode }}**"
            echo "- Feature: **${{ steps.meta.outputs.feature_slug }}**"
            echo "- Status: **${{ job.status }}**"
          } >> "$GITHUB_STEP_SUMMARY"
