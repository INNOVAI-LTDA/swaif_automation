name: Project Input
description: Entrada do pipeline — pedido do cliente em formato estruturado
title: "[SWAIF] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Preencha o essencial. Após criar a issue, você pode **anexar arquivos** (drag&drop) e colar links.

        **Disparo:**
        - Labels: `swaif:init`, `swaif:specify`, `swaif:plan`, `swaif:tasks`, `swaif:implement`, `swaif:verify`
        - Comments: `/run specify` • `/run plan` • `/run tasks` • `/run implement apply`

  - type: input
    id: feature_slug
    attributes:
      label: Feature Slug
      description: kebab-case. 
      placeholder: 001-example-feature
    validations:
      required: true

  - type: dropdown
    id: declared_execution_type
    attributes:
      label: Tipo de Execução
      options: [MVP, Refactor, Bugfix, New Feature, Research]
    validations:
      required: true

  - type: textarea
    id: overview
    attributes:
      label: Visão Geral
      description: O que o cliente quer (1–5 linhas).
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Escopo do projeto
      description: Bullets curtos.
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Termos de Aceitação
      description: Mensurável.
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Restrições
      description: List technical, timeline, compliance, or dependency constraints.
      value: |
        - Constraint 1
        - Constraint 2
    validations:
      required: true
      
  - type: textarea
    id: non_goals
    attributes:
      label: Non-Goals
      description: Explicitly list what is out of scope.
      value: |
        - Out-of-scope item 1
        - Out-of-scope item 2
    validations:
      required: true
      
  - type: textarea
    id: implementation_hints
    attributes:
      label: Dicas de Implementação (optional)
      description: Optional references, docs, or technical pointers.
      placeholder: Helpful references or implementation notes.
    validations:
      required: false
      
  - type: input
    id: base_reference
    attributes:
      label: Base de referência (para refactor)
      description: commit SHA, tag, branch ou link de PR
    validations:
      required: false

  - type: textarea
    id: files_or_modules
    attributes:
      label: Arquivos/Módulos alvo (para refactor)
    validations:
      required: false

  - type: textarea
    id: reference_artifacts
    attributes:
      label: Artefatos de referência (links)
      description: cole links para anexos, docs, imagens, PDFs, zips etc.
    validations:
      required: false
